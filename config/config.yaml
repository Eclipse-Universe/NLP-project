general:
  data_path: /root/data
  model_name: digit82/kobart-summarization
  output_dir: /root/outputs/checkpoints
  result_path: /root/outputs/predictions

tokenizer:
  encoder_max_len: 1024   # baseline 512 → 1024 (긴 대화 truncation 방지)
  decoder_max_len: 100
  special_tokens:          # baseline은 Person3까지만 등록 → 7까지 전부 등록
    - '#Person1#'
    - '#Person2#'
    - '#Person3#'
    - '#Person4#'
    - '#Person5#'
    - '#Person6#'
    - '#Person7#'
    - '#PhoneNumber#'
    - '#Address#'
    - '#PassportNumber#'

training:
  num_train_epochs: 10
  learning_rate: 1.0e-5
  per_device_train_batch_size: 8    # max_len 늘었으니 batch 줄임
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4    # 유효 배치 = 8 * 4 = 32
  warmup_ratio: 0.1
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: adamw_torch
  evaluation_strategy: epoch
  save_strategy: epoch
  save_total_limit: 3
  fp16: true
  load_best_model_at_end: true
  metric_for_best_model: rouge_avg  # rouge-1 + rouge-2 + rouge-l 합산
  greater_is_better: true
  seed: 42
  logging_dir: /root/outputs/logs
  logging_strategy: epoch
  predict_with_generate: true
  generation_max_length: 100
  early_stopping_patience: 3
  early_stopping_threshold: 0.001

inference:
  checkpoint_path: ""
  no_repeat_ngram_size: 3     # 3-gram 반복 차단
  early_stopping: true
  generate_max_new_tokens: 30   # 정답 avg 31토큰 ≈ 80자에 맞춤 (grid search 최적값)
  num_beams: 4
  length_penalty: 0.5           # grid search 최적값
  batch_size: 32
