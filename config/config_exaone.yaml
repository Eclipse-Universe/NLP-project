general:
  data_path: /root/data
  model_name: LGAI-EXAONE/EXAONE-3.5-7.8B-Instruct
  output_dir: /root/outputs/checkpoints_exaone
  result_path: /root/outputs/predictions

wandb:
  entity: dopago2000-
  project: dialogue-summarization
  name: exaone-3.5-7.8b-lora-v1

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - out_proj
    - c_fc_0
    - c_fc_1
    - c_proj

tokenizer:
  max_length: 1024

training:
  num_train_epochs: 3
  learning_rate: 2.0e-4
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: cosine
  optim: adamw_torch
  evaluation_strategy: epoch
  save_strategy: epoch
  save_total_limit: 3
  bf16: true
  load_best_model_at_end: false
  seed: 42
  logging_dir: /root/outputs/logs_exaone
  logging_strategy: steps
  logging_steps: 50
  gradient_checkpointing: true

inference:
  checkpoint_path: ""
  max_new_tokens: 100
  num_beams: 4
  length_penalty: 0.7
  do_sample: false
  temperature: 1.0

system_prompt: "당신은 대화 요약 전문가입니다. 주어진 대화를 읽고 핵심 내용을 간결하게 요약하세요. #Person1#, #Person2# 등의 형식으로 화자를 표기하세요."
